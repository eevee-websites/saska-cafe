<nav {% unless page.banner %}id="scrolled"{% endunless %}>
	<ul>
		<li id="nav-icons">
			<a href="tel:{{ site.data.contact.phone }}" title="Phone" target="_blank" rel="noopener">
				<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
			</a>
			<a href="https://www.facebook.com/saskacafe" title="Facebook" target="_blank" rel="noopener">
				<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"></path></svg>
			</a>
			<a href="https://www.instagram.com/saskacafe3193/" title="Instagram" target="_blank" rel="noopener">
				<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5" fill="none" stroke-width="2"></rect><path d="M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10z" fill="none" stroke-width="2"></path><circle cx="17.5" cy="6.5" r="1.5"></circle></svg>
			</a>
		</li>
		<li id="mobileLogo">
			<a href="{{ '/' | relative_url }}">
				<img src="{{ '/assets/images/logo.webp' | relative_url }}" alt="{{ site.data.brand.name }} logo">
			</a>
		</li>
		{% for navigation_page in site.data.navigation %}
			<li>
				<a href="{{ navigation_page.url | relative_url }}"{% if page.title == navigation_page.title %} class="currentPage"{% endif %} tabindex="0">{{ navigation_page.title }}</a>
			</li>
		{% endfor %}
	</ul>

<style>
	#nav-icons {
		display: flex;
		gap: 1rem;
		align-items: center;
		float: left;
		list-style: none;
		padding: 0;
		margin: 0;
		margin-right: 2rem;
		color: #03AABC;
	}

	#nav-icons a {
		display: flex;
		align-items: center;
		justify-content: center;
		width: 32px;
		height: 32px;
		color: #03AABC;
		text-decoration: none;
		transition: opacity 0.3s ease;
		border: none;
	}

	#nav-icons a:hover {
		opacity: 0.7;
	}

	#nav-icons svg {
		width: 100%;
		height: 100%;
		stroke: #03AABC !important;
		fill: #03AABC;
		border: none;
	}

	@media (max-width: 768px) {
		#nav-icons {
			display: none;
		}
	}
</style>
</nav>
